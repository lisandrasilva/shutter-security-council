name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Run invariants
        run: forge test --match-path "test/invariant/*" -vvv

      - name: Run extended fuzz tests
        run: forge test --match-test testFuzz_ --fuzz-runs 5000 -vvv
